<!DOCTYPE html>
<html>
<head>
    <style>
        /* Force the background to be invisible */
        html, body {
            background: #5a0000 !important;
            background-color: #5a0000 !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body { 
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .vortex-card {
            width: 227px;
            background: linear-gradient(165deg, #120000 0%, #1a0000 50%, #0a0000 100%);
            border-radius: 20px;
            padding: 0;
            box-shadow: 
                0 0 40px rgba(255, 0, 0, 0.2),
                0 0 80px rgba(139, 0, 0, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            overflow: hidden;
        }
        
        .vortex-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff0000, #8b0000, #ff4d4d, #ff0000);
            border-radius: 20px;
            z-index: -1;
            background-size: 300% 300%;
            animation: gradient-shift 6s ease infinite;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .vortex-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 77, 77, 0.1), transparent);
            animation: scan 4s ease-in-out infinite;
        }
        
        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .header-section {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.15) 0%, rgba(139, 0, 0, 0.1) 100%);
            padding: 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 0, 0, 0.3);
            position: relative;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }
        
        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #ff0000 0%, #ff4d4d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 16px;
            box-shadow: 
                0 0 20px rgba(255, 0, 0, 0.5),
                0 4px 8px rgba(0, 0, 0, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
            position: relative;
        }
        
        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 
                    0 0 20px rgba(255, 0, 0, 0.5),
                    0 4px 8px rgba(0, 0, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 30px rgba(255, 0, 0, 0.8),
                    0 0 50px rgba(255, 0, 0, 0.4),
                    0 4px 8px rgba(0, 0, 0, 0.3);
            }
        }
        
        .member-count {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(139, 0, 0, 0.3) 100%);
            color: #ffe0e0;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            margin-left: auto;
        }
        
        .header-text {
            color: #ffe0e0;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        
        #list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            padding: 16px;
        }
        
        .member-box {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.05) 0%, rgba(139, 0, 0, 0.08) 100%);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .member-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.15), transparent);
            transition: left 0.6s ease;
        }
        
        .member-box:hover::before {
            left: 100%;
        }
        
        .member-box:hover {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.12) 0%, rgba(139, 0, 0, 0.15) 100%);
            transform: translateY(-3px) scale(1.02);
            border-color: rgba(255, 77, 77, 0.5);
            box-shadow: 
                0 8px 20px rgba(255, 0, 0, 0.3),
                0 0 30px rgba(255, 0, 0, 0.1);
        }
        
        .avatar-wrapper {
            position: relative;
        }
        
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255, 0, 0, 0.4);
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        
        .member-box:hover .avatar {
            border-color: rgba(255, 77, 77, 0.8);
            box-shadow: 
                0 0 25px rgba(255, 0, 0, 0.6),
                0 0 40px rgba(255, 0, 0, 0.3);
            transform: rotate(-5deg) scale(1.05);
        }
        
        .new-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ff4d4d 0%, #cc0000 100%);
            color: #ffffff;
            font-size: 7px;
            font-weight: 900;
            padding: 3px 6px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 
                0 0 15px rgba(255, 0, 0, 0.6),
                0 2px 8px rgba(0, 0, 0, 0.4);
            animation: badge-pulse 2s ease-in-out infinite;
        }
        
        @keyframes badge-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .info-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }
        
        .name {
            color: #ffe0e0;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
        }
        
        .time-ago {
            color: rgba(255, 77, 77, 0.7);
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Courier New', monospace;
        }
        
        .time-ago::before {
            content: '▸';
            font-size: 10px;
            color: rgba(255, 0, 0, 0.6);
        }
        
        .rank-number {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(139, 0, 0, 0.3) 100%);
            color: #ffe0e0;
            font-size: 12px;
            font-weight: 900;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 2px solid rgba(255, 0, 0, 0.4);
            font-family: 'Courier New', monospace;
            box-shadow: 
                0 0 15px rgba(255, 0, 0, 0.4),
                inset 0 0 10px rgba(255, 0, 0, 0.2);
            transition: all 0.4s ease;
        }
        
        .member-box:hover .rank-number {
            transform: rotate(360deg);
            border-color: rgba(255, 77, 77, 0.8);
            box-shadow: 
                0 0 25px rgba(255, 0, 0, 0.7),
                inset 0 0 15px rgba(255, 0, 0, 0.3);
        }
        
        .loading-text {
            color: rgba(255, 77, 77, 0.5);
            font-size: 11px;
            text-align: center;
            padding: 20px;
            font-style: italic;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        
        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="vortex-card">
        <div class="header-section">
            <div id="member-count-container" style="display: none; width: 100%; align-items: center;">
                <div class="header-text" style="font-size: 11px;">Member Count</div>
                <div id="member-count-val" class="member-count"></div>
            </div>
            <div class="header-text">New Members</div>
        </div>
        
        <div id="list">
            <div class="loading-text">Loading new members...</div>
        </div>
    </div>

    <script>
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = Math.floor(seconds / 31536000);
            if (interval >= 1) return interval + "y ago";
            interval = Math.floor(seconds / 2592000);
            if (interval >= 1) return interval + "mo ago";
            interval = Math.floor(seconds / 86400);
            if (interval >= 1) return interval + "d ago";
            interval = Math.floor(seconds / 3600);
            if (interval >= 1) return interval + "h ago";
            interval = Math.floor(seconds / 60);
            if (interval >= 1) return interval + "m ago";
            return "just now";
        }

        async function load() {
            const list = document.getElementById('list');
            const countContainer = document.getElementById('member-count-container');
            const countVal = document.getElementById('member-count-val');
            const headers = { 'User-Agent': 'VortexSidebar/2.0' };
            const defaultPawn = 'https://www.chess.com/bundles/web/images/user-image.007dad08.svg';

            try {
                // Fetch overall club info to get the total member count
                const clubRes = await fetch('https://api.chess.com/pub/club/hunter-team', { headers });
                const clubData = await clubRes.json();
                
                let totalMembers = null;
                if (clubData && clubData.members_count) {
                    totalMembers = clubData.members_count;
                }

                // Fetch the recent members
                const r = await fetch('https://api.chess.com/pub/club/hunter-team/members', { headers });
                const d = await r.json();
                
                const allMembers = [...(d.weekly || []), ...(d.monthly || [])];
                const allTimeMembers = d.all_time || [];
                
                // Fallback to calculating from members list if club API doesn't provide it
                if (!totalMembers) {
                    totalMembers = allMembers.length + allTimeMembers.length;
                }

                // Display the member count
                if (totalMembers !== null) {
                    countVal.innerText = totalMembers.toLocaleString();
                    countContainer.style.display = 'flex';
                }
                
                const top3 = allMembers
                    .sort((a, b) => b.joined - a.joined)
                    .slice(0, 3);

                list.innerHTML = '';
                
                // Use Promise.all to fetch all member data, then render in order
                const memberPromises = top3.map(m => 
                    fetch(`https://api.chess.com/pub/player/${m.username}`, { headers })
                        .then(pR => pR.json())
                        .then(pData => ({
                            username: m.username,
                            avatar: (pData.avatar && pData.avatar !== "") ? pData.avatar : defaultPawn,
                            joined: m.joined
                        }))
                        .catch(err => {
                            console.error(err);
                            return {
                                username: m.username,
                                avatar: defaultPawn,
                                joined: m.joined
                            };
                        })
                );

                const members = await Promise.all(memberPromises);
                
                // Render members in correct order (1st, 2nd, 3rd)
                members.forEach((member, index) => {
                    const joinedDate = new Date(member.joined * 1000);
                    
                    const memberHTML = `
                        <a href="https://www.chess.com/member/${member.username}" target="_blank">
                            <div class="member-box">
                                <div class="rank-number">${index + 1}</div>
                                <div class="avatar-wrapper">
                                    <img src="${member.avatar}" class="avatar" onerror="this.src='${defaultPawn}'">
                                    <div class="new-badge">new</div>
                                </div>
                                <div class="info-container">
                                    <span class="name">${member.username}</span>
                                    <span class="time-ago">${timeAgo(joinedDate)}</span>
                                </div>
                            </div>
                        </a>`;
                    
                    list.innerHTML += memberHTML;
                });
                
            } catch (e) {
                list.innerHTML = "<div class='loading-text'>Unable to load members</div>";
            }
        }
        load();
    </script>
</body>
</html>
